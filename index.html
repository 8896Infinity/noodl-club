      '%;width:'+w+'px;height:'+w+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+
      ';animation-delay:-'+(Math.random()*8).toFixed(2)+'s;animation-duration:'+(3+Math.random()*5).toFixed(2)+'s';
    box.appendChild(s);
  }
})();

/* ================= sparkles (4-point stars) ================= */
function starPath(cx,cy,s){
  const q=(s*0.24).toFixed(1);
  return 'M'+cx+' '+(cy-s)+' Q'+(cx+ +q)+' '+(cy- +q)+' '+(cx+s)+' '+cy+
         ' Q'+(cx+ +q)+' '+(cy+ +q)+' '+cx+' '+(cy+s)+
         ' Q'+(cx- +q)+' '+(cy+ +q)+' '+(cx-s)+' '+cy+
         ' Q'+(cx- +q)+' '+(cy- +q)+' '+cx+' '+(cy-s)+' Z';
}
document.querySelectorAll('[data-star]').forEach(p=>{
  const [x,y,s]=p.dataset.star.split(',').map(Number);
  p.setAttribute('d',starPath(x,y,s));
});

/* ================= spiral ================= */
const TURNS=2.55,R0=40,R1=262,THETA_END=145*Math.PI/180;
function spiralPt(t){
  const th=THETA_END-(1-t)*TURNS*2*Math.PI, r=R0+(R1-R0)*t;
  return [CX+r*Math.cos(th),CY+r*Math.sin(th)];
}
(function(){
  const N=280;let d='';
  for(let i=0;i<=N;i++){const p=spiralPt(i/N);d+=(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1);}
  ['nGlow1','nGlow2','nEdge','nFill','nHatch','nDim'].forEach(id=>document.getElementById(id).setAttribute('d',d));
})();
const measure=$('#nFill');
const TOTAL=measure.getTotalLength();
const ptAt=f=>{const p=measure.getPointAtLength(TOTAL*clamp(f,0,1));return [p.x,p.y];};
function radialOffset(p,d){
  const vx=p[0]-CX,vy=p[1]-CY,L=Math.hypot(vx,vy)||1;
  return [p[0]+vx/L*d,p[1]+vy/L*d];
}

/* ================= labels (non-rotating overlay) ================= */
const labelItems=[]; // {text, chip, base:[x,y], w}
function makeLabel(txt,base,cls){
  const chip=document.createElementNS(SVGNS,'rect');
  chip.setAttribute('class','ms-chip');chip.setAttribute('height','26');chip.setAttribute('rx','9');
  const t=document.createElementNS(SVGNS,'text');
  t.setAttribute('class','ms-label'+(cls?' '+cls:''));t.textContent=txt;
  $('#labels').appendChild(chip);$('#labels').appendChild(t);
  const item={text:t,chip:chip,base:base,w:0};
  labelItems.push(item);
  requestAnimationFrame(()=>{item.w=t.getBBox().width+16;placeLabels();});
  return item;
}
let angle=0;
function rotPt(p,aDeg){
  const a=aDeg*Math.PI/180,s=Math.sin(a),c=Math.cos(a),vx=p[0]-CX,vy=p[1]-CY;
  return [CX+vx*c-vy*s,CY+vx*s+vy*c];
}
function placeLabels(){
  for(const it of labelItems){
    const [x,y]=rotPt(it.base,angle);
    it.text.setAttribute('x',x);it.text.setAttribute('y',y+1);
    it.chip.setAttribute('width',it.w||40);
    it.chip.setAttribute('x',x-(it.w||40)/2);it.chip.setAttribute('y',y-13);
  }
  // progress head label
  const [hx,hy]=rotPt(headLabelBase,angle);
  headLabelEl.setAttribute('x',hx);headLabelEl.setAttribute('y',hy+1);
  const hw=headLabelW||60;
  headChipEl.setAttribute('width',hw);
  headChipEl.setAttribute('x',hx-hw/2);headChipEl.setAttribute('y',hy-13);
}

/* ================= milestones ================= */
const msNodes=[],msLabels=[];
MILESTONES.forEach(m=>{
  const f=fracOf(m),p=ptAt(f);
  const node=document.createElementNS(SVGNS,'path');
  node.setAttribute('d',starPath(p[0],p[1],m===5000?16:11.5));
  node.setAttribute('class','ms');node.dataset.m=m;
  $('#milestones').appendChild(node);msNodes.push({m,el:node});
  const off=m===5000?radialOffset(p,-54):radialOffset(p,36);
  const lb=makeLabel(m+' BTC',off);lb.text.dataset.m=m;
  msLabels.push({m,el:lb.text});
});
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(()=>{
  labelItems.forEach(it=>{try{it.w=it.text.getBBox().width+16;}catch(e){}});
  try{if(headLabelEl.textContent)headLabelW=headLabelEl.getBBox().width+16;}catch(e){}
  placeLabels();
});

/* ================= planets ================= */
let openTimer=0;
function openCardByKey(key,fromEl){
  const c=I18N[lang].cards[key];
  $('#cardIcon').textContent=(PLANETS.find(p=>p.key===key)||{icon:'🍜'}).icon;
  $('#cardTitle').textContent=c.title;
  $('#cardBody').textContent=c.body;
  const cta=$('#cardCta');cta.textContent=c.cta;cta.href=LINKS[key];
  overlay.classList.add('open');
  document.body.classList.add('modal');document.documentElement.classList.add('modal');
  ['header','main','footer'].forEach(s=>{const el=document.querySelector(s);if(el)el.inert=true;});
  overlay.dataset.ret=key;targetSpeed=0;
  clearTimeout(openTimer);openTimer=setTimeout(()=>$('#cardClose').focus(),80);
}
function makePlanet(key,x,y,r,color,icon){
  const c=document.createElementNS(SVGNS,'circle');
  c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);
  c.setAttribute('fill',color);c.setAttribute('class','planet');
  c.setAttribute('tabindex','0');c.setAttribute('role','button');
  c.dataset.key=key;
  const a=document.createElementNS(SVGNS,'animate');
  a.setAttribute('attributeName','r');
  a.setAttribute('values',r+';'+(r+1.7)+';'+r);
  a.setAttribute('dur',(3.2+Math.random()*1.8).toFixed(1)+'s');
  a.setAttribute('repeatCount','indefinite');
  if(!reduceMotion)c.appendChild(a);
  c.addEventListener('click',()=>openCardByKey(key,c));
  c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openCardByKey(key,c);}});
  c.addEventListener('pointerenter',()=>{targetSpeed=0;});
  c.addEventListener('pointerleave',()=>{if(!overlay.classList.contains('open'))targetSpeed=1;});
  c.addEventListener('focus',()=>{targetSpeed=0;});
  c.addEventListener('blur',()=>{if(!overlay.classList.contains('open'))targetSpeed=1;});
  $('#planets').appendChild(c);
  return c;
}
const planetEls={};
PLANETS.forEach(p=>{const [x,y]=ptAt(p.t);planetEls[p.key]=makePlanet(p.key,x,y,p.r,p.color,p.icon);});
planetEls.noodle=makePlanet('noodle',CX,CY,20,'#a8492f','🍜');
function applyAria(){
  Object.keys(planetEls).forEach(k=>planetEls[k].setAttribute('aria-label',I18N[lang].aria[k]));
}

/* ================= progress head ================= */
const headEl=$('#head'),headLabelEl=$('#headLabel'),headChipEl=$('#headChip');
let headLabelBase=[CX,CY-40],headLabelW=70;

/* ================= rotation ================= */
const galaxySvg=$('#galaxySvg');
let speed=1,targetSpeed=1,lastT=performance.now();
const PERIOD=180; // seconds per revolution
function tick(now){
  const dt=Math.min(0.1,(now-lastT)/1000);lastT=now;
  speed+=(targetSpeed-speed)*Math.min(1,dt*3);
  angle=(angle+dt*speed*360/PERIOD)%360;
  galaxySvg.style.transform='rotate('+angle+'deg)';
  placeLabels();
  requestAnimationFrame(tick);
}
if(!reduceMotion)requestAnimationFrame(tick);

/* ================= progress ================= */
let shownFrac=0;
function applyFrac(f){
  shownFrac=f;
  const lit=TOTAL*f;
  $('#nGlow1').setAttribute('stroke-dasharray',lit+' '+(TOTAL+80));
  $('#nGlow2').setAttribute('stroke-dasharray',lit+' '+(TOTAL+80));
  $('#nDim').setAttribute('stroke-dasharray','0 '+lit+' '+Math.max(TOTAL-lit,0.001)+' 0');
  const [hx,hy]=ptAt(f);
  headEl.setAttribute('cx',hx);headEl.setAttribute('cy',hy);
  headLabelBase=radialOffset([hx,hy],34);
  $('#trackFill').style.width=(f*100).toFixed(2)+'%';
  placeLabels();
}
let progAnim=null;
function setProgress(frac){
  if(progAnim)cancelAnimationFrame(progAnim);
  const from=shownFrac,start=performance.now(),dur=1500;
  (function step(now){
    const t=clamp((now-start)/dur,0,1),e=1-Math.pow(1-t,3);
    applyFrac(from+(frac-from)*e);
    if(t<1)progAnim=requestAnimationFrame(step);else progAnim=null;
  })(start);
}

/* ================= tracker chips ================= */
(function(){
  const wrap=$('#chips');
  const items=[{m:LAUNCH_MC,big:'0.211',key:'launch'}]
    .concat(MILESTONES.map(m=>({m,big:String(m),key:m===5000?'nova':'btc'})));
  items.forEach(it=>{
    const div=document.createElement('div');
    div.className='chip';div.dataset.m=it.m;
    div.style.left=(fracOf(it.m)*100).toFixed(2)+'%';
    div.innerHTML='<i class="dot"></i><b>'+it.big+'</b><span data-chip="'+it.key+'"></span>';
    wrap.appendChild(div);
  });
})();
function applyChipLang(){
  document.querySelectorAll('[data-chip]').forEach(s=>{
    const k=s.dataset.chip;
    s.textContent=k==='launch'?I18N[lang].ui.launch:k==='nova'?I18N[lang].ui.nova:I18N[lang].ui.btc;
  });
}

/* ================= data ================= */
const DEFAULTS={mc:0.7707,btcUsd:61982,holders:104,live:false};
let state=Object.assign({},DEFAULTS);
let seeded=true; // true until we have real data (cache or live) — never present DEFAULTS as facts
try{
  const cached=JSON.parse(localStorage.getItem('noodl_cache')||'null');
  if(cached&&Number.isFinite(Number(cached.mc))&&Number(cached.mc)>0){
    state=Object.assign({},DEFAULTS,{
      mc:Number(cached.mc),
      btcUsd:Number(cached.btcUsd)>0?Number(cached.btcUsd):DEFAULTS.btcUsd,
      holders:Number.isFinite(Number(cached.holders))&&Number(cached.holders)>0?Math.floor(Number(cached.holders)):DEFAULTS.holders
    });
    seeded=false;
  }
}catch(e){}

function fmtBtc(v){return v<1?v.toFixed(3):v<100?v.toFixed(2):Math.round(v).toLocaleString('en-US');}
function fmtUsd(v){return v<1e6?'$'+(v/1e3).toFixed(1)+'K':'$'+(v/1e6).toFixed(2)+'M';}

async function getJson(urls){
  for(const u of urls){
    try{const r=await fetch(u,{cache:'no-store'});if(r.ok)return await r.json();}catch(e){}
  }
  return null;
}
let refreshing=false;
async function refresh(){
  if(refreshing)return;
  refreshing=true;
  try{
    const tok=await getJson(['https://api.odin.fun/v2/token/hjrg','/api/odin/token/hjrg']);
    const mcVal=tok?Number(tok.marketcap)/1e11:NaN;
    if(Number.isFinite(mcVal)&&mcVal>0){
      const cur=await getJson(['https://api.odin.fun/v2/currency/btc','/api/odin/currency/btc']);
      state.mc=mcVal;
      const usd=cur?Number(cur.amount):NaN;
      if(Number.isFinite(usd)&&usd>0)state.btcUsd=usd;
      const h=Number(tok.holder_count);
      if(Number.isFinite(h)&&h>0)state.holders=Math.floor(h);
      state.live=true;seeded=false;
      try{localStorage.setItem('noodl_cache',JSON.stringify({mc:state.mc,btcUsd:state.btcUsd,holders:state.holders}));}catch(e){}
    }else{
      state.live=false;
    }
    render();
  }finally{refreshing=false;}
}

/* ================= render ================= */
let lastLiveHtml='';
function render(){
  const ui=I18N[lang].ui,f=fracOf(state.mc);
  if(Math.abs(f-shownFrac)>0.0005)setProgress(f);else applyFrac(shownFrac);
  headLabelEl.textContent=(!state.live&&seeded)?'…':fmtBtc(state.mc)+' BTC';
  requestAnimationFrame(()=>{try{headLabelW=headLabelEl.getBBox().width+16;}catch(e){}placeLabels();});
  // milestone lit states
  msNodes.forEach(o=>o.el.classList.toggle('lit',state.mc>=o.m));
  msLabels.forEach(o=>o.el.classList.toggle('lit',state.mc>=o.m));
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('lit',state.mc>=parseFloat(c.dataset.m)));
  // live line (skip DOM write when unchanged so aria-live doesn't re-announce)
  let html;
  if(!state.live&&seeded){
    html='<span class="live-dot off"></span>'+ui.offline+' · '+ui.mcap+' —';
  }else{
    const usd=fmtUsd(state.mc*state.btcUsd);
    html='<span class="live-dot'+(state.live?'':' off')+'"></span>'+
      (state.live?ui.live:ui.cached)+' · '+ui.mcap+' <b style="color:#ffe9a3">'+fmtBtc(state.mc)+' BTC</b> ('+usd+') · '+
      state.holders+' '+ui.holders;
  }
  if(html!==lastLiveHtml){lastLiveHtml=html;$('#liveLine').innerHTML=html;}
  const next=MILESTONES.find(m=>state.mc<m);
  $('#nextLine').textContent=(!state.live&&seeded)?'':(next?ui.toNext((100*state.mc/next).toFixed(1),next):ui.reached);
}

/* ================= i18n apply ================= */
function applyLang(){
  document.documentElement.lang=lang==='zh'?'zh-CN':'en';
  const ui=I18N[lang].ui;
  document.querySelectorAll('[data-i]').forEach(el=>{const k=el.dataset.i;if(typeof ui[k]==='string')el.textContent=ui[k];});
  $('#langBtn').textContent=lang==='en'?'中文':'EN';
  applyChipLang();applyAria();render();
}
$('#langBtn').addEventListener('click',()=>{
  lang=lang==='en'?'zh':'en';
  try{localStorage.setItem('noodl_lang',lang);}catch(e){}
  applyLang();
});

/* ================= modal ================= */
const overlay=$('#overlay');
function closeCard(){
  clearTimeout(openTimer);
  ['header','main','footer'].forEach(s=>{const el=document.querySelector(s);if(el)el.inert=false;});
  overlay.classList.remove('open');
  document.body.classList.remove('modal');document.documentElement.classList.remove('modal');
  targetSpeed=1;
  const k=overlay.dataset.ret;
  if(k&&planetEls[k])planetEls[k].focus({preventScroll:true});
}
$('#cardClose').addEventListener('click',closeCard);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeCard();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&overlay.classList.contains('open'))closeCard();});

/* ================= boot ================= */
applyFrac(fracOf(state.mc));
applyLang();
refresh();
setInterval(refresh,45000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh();});
</script>
</body>
