<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>#NOODL posts · NOODL.club</title>
<meta name="description" content="A hand-picked collection of #NOODL posts from the Noodle Nova community, ranked by heat or by time.">
<meta name="theme-color" content="#151a36">
<meta name="robots" content="index,follow">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='0.9em'%20font-size='90'%3E%F0%9F%8D%9C%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Same palette as index.html — taken from odin.fun's own computed styles. */
:root{
  --bg:#111117;--panel:#18181d;--line:#27272a;--line-soft:#1f1f25;
  --cyan:#00ffff;--cyan-dim:#00c9c9;--text:#fafafa;--text-2:#a8aab8;
  --dim:#6b6d7c;--up:#00a329;--card-bg:#18181d;--cream-bright:#fafafa;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);min-height:100vh;
  font-family:'Work Sans','PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif;
}
a{color:inherit}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
#stars i{position:absolute;border-radius:1.5px;animation:tw linear infinite}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.9}}

.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:18px 18px 60px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:26px;flex-wrap:wrap;
  padding-bottom:14px;border-bottom:1px solid var(--line)}
.wordmark{font-weight:700;font-size:16px;letter-spacing:.14em;color:var(--cyan);text-decoration:none;display:flex;align-items:center;gap:8px}
.btn{
  font-family:inherit;font-weight:500;font-size:12.5px;letter-spacing:.02em;cursor:pointer;
  color:var(--text-2);text-decoration:none;background:transparent;
  border:1px solid var(--line);border-radius:6px;padding:6px 12px;
  transition:border-color .15s,color .15s,background .15s;
}
.btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,255,.06)}
#langBtn{color:var(--cyan);border-color:rgba(0,255,255,.35)}

h1{font-weight:800;font-size:clamp(28px,6.5vw,42px);line-height:1.05;color:var(--text);letter-spacing:.01em}
.sub{color:var(--text-2);font-weight:400;font-size:13.5px;margin-top:12px;line-height:1.7}
.sub a{color:var(--cyan-dim);text-decoration:none}
.sub a:hover{color:var(--cyan)}

.sorts{display:flex;align-items:center;gap:8px;margin:22px 0 16px;flex-wrap:wrap}
.sorts .lbl{font-size:10.5px;font-weight:600;letter-spacing:.16em;color:var(--dim)}
.sort{
  font-family:inherit;font-weight:500;font-size:12.5px;cursor:pointer;
  background:transparent;color:var(--text-2);border:1px solid var(--line);
  border-radius:6px;padding:6px 14px;transition:all .15s;
}
.sort:hover{color:var(--cyan);border-color:var(--cyan)}
.sort[aria-pressed="true"]{background:var(--cyan);color:#06060a;border-color:var(--cyan);font-weight:600}
.count{margin-left:auto;font-size:11.5px;font-weight:500;color:var(--dim);font-variant-numeric:tabular-nums}

.card{
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:15px 16px 13px;margin-bottom:10px;transition:border-color .15s;
}
.card:hover{border-color:#3f3f46}
.c-top{display:flex;align-items:center;gap:10px}
.c-av{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:var(--cyan);color:#06060a;font-weight:700;font-size:15px}
.c-who{min-width:0;line-height:1.3}
.c-name{font-weight:600;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-handle{font-weight:400;font-size:12px;color:var(--dim)}
.c-rank{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--cyan);flex:none;font-variant-numeric:tabular-nums}
.c-text{color:var(--text-2);font-weight:400;font-size:13.5px;line-height:1.7;margin:11px 0 11px;white-space:pre-wrap;overflow-wrap:anywhere}
.fd-tag{color:var(--cyan)}
.fd-link{color:var(--cyan-dim)}
.c-meta{display:flex;align-items:center;gap:13px;font-size:11.5px;font-weight:500;color:var(--dim);flex-wrap:wrap;font-variant-numeric:tabular-nums}
.c-meta .hot{color:var(--cyan)}
.c-open{margin-left:auto;color:var(--cyan-dim);text-decoration:none;font-weight:500}
.c-open:hover{color:var(--cyan)}
.empty{text-align:center;color:var(--dim);font-weight:400;padding:50px 0}
footer{text-align:center;color:var(--dim);font-weight:400;font-size:11.5px;padding:30px 0 0;line-height:1.9;
  border-top:1px solid var(--line-soft);margin-top:30px}
footer a{color:var(--text-2);text-decoration:none}
footer a:hover{color:var(--cyan)}
@media (prefers-reduced-motion:reduce){#stars i{animation:none!important}.card{transition:none}}
</style>
</head>
<body>
<div id="stars" aria-hidden="true"></div>
<div class="wrap">
  <header class="topbar">
    <a class="wordmark" href="index.html">🍜 NOODL·CLUB</a>
    <nav style="display:flex;gap:8px;align-items:center">
      <a class="btn" href="index.html" data-i="back">← Home</a>
      <button class="btn" id="langBtn" type="button">中文</button>
    </nav>
  </header>

  <h1 data-i="title">#NOODL POSTS</h1>
  <p class="sub" id="sub"></p>

  <div class="sorts">
    <span class="lbl" data-i="sortBy">SORT BY</span>
    <button class="sort" id="sHeat" type="button" aria-pressed="true" data-i="byHeat">Heat</button>
    <button class="sort" id="sTime" type="button" aria-pressed="false" data-i="byTime">Newest</button>
    <span class="count" id="count"></span>
  </div>

  <!-- no aria-live here: re-sorting would re-announce every post in full -->
  <div id="list"></div>

  <footer>
    <span data-i="foot"></span><br>
    <a href="index.html">NOODL.club</a> ·
    <a href="https://odin.fun/token/hjrg" target="_blank" rel="noopener">odin.fun/token/hjrg</a>
  </footer>
</div>

<script src="tweets.js"></script>
<script src="tweets-ui.js"></script>
<script>
'use strict';
const T=window.NoodlTweets,$=s=>document.querySelector(s);

const I18N={
 en:{
  back:'← Home',title:'#NOODL POSTS',sortBy:'SORT BY',byHeat:'Heat',byTime:'Newest',
  sub:'A hand-picked collection of #NOODL posts from the Noodle Nova community. Heat = likes + 2×reposts + replies. <a href="'+T.SEARCH_URL+'" target="_blank" rel="noopener">See the live #NOODL feed on X ↗</a>',
  count:n=>n+' posts',rank:i=>'#'+i,open:'View on X ↗',
  empty:'No posts collected yet.',
  foot:'NOODL is a community meme token on Odin.Fun. Nothing here is financial advice — just noodles. 🍜'
 },
 zh:{
  back:'← 首页',title:'#NOODL 帖子',sortBy:'排序',byHeat:'热度',byTime:'最新',
  sub:'Noodle Nova 社区的 #NOODL 帖子精选。热度 = 点赞 + 2×转发 + 回复。<a href="'+T.SEARCH_URL+'" target="_blank" rel="noopener">去 X 看 #NOODL 实时动态 ↗</a>',
  count:n=>n+' 条帖子',rank:i=>'第 '+i+' 名',open:'在 X 查看 ↗',
  empty:'还没有收录帖子。',
  foot:'NOODL 是 Odin.Fun 上的社区 meme 代币。本页不构成任何投资建议 —— 只有面条。🍜'
 }
};
let lang;try{const s=localStorage.getItem('noodl_lang');if(s==='en'||s==='zh')lang=s;}catch(e){}
if(!lang)lang=(navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en';
let sort='heat';

(function(){
  const box=$('#stars'),colors=['#f4ead0','#f5a86a','#8fd0c8','#ffffff','#e06a2b'];
  for(let i=0;i<70;i++){
    const s=document.createElement('i'),w=(1.5+Math.random()*2.5).toFixed(1);
    s.style.cssText='left:'+(Math.random()*100).toFixed(2)+'%;top:'+(Math.random()*100).toFixed(2)+
      '%;width:'+w+'px;height:'+w+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+
      ';animation-delay:-'+(Math.random()*8).toFixed(2)+'s;animation-duration:'+(3+Math.random()*5).toFixed(2)+'s';
    box.appendChild(s);
  }
})();

function render(){
  const ui=I18N[lang];
  document.documentElement.lang=lang==='zh'?'zh-CN':'en';
  document.querySelectorAll('[data-i]').forEach(el=>{const v=ui[el.dataset.i];if(typeof v==='string')el.textContent=v;});
  $('#sub').innerHTML=ui.sub;
  $('#langBtn').textContent=lang==='en'?'中文':'EN';
  $('#sHeat').setAttribute('aria-pressed',String(sort==='heat'));
  $('#sTime').setAttribute('aria-pressed',String(sort==='time'));

  const all=T.list();
  const rows=sort==='heat'?T.byHeat(all):T.byTime(all);
  $('#count').textContent=ui.count(rows.length);
  if(!rows.length){$('#list').innerHTML='<p class="empty">'+T.esc(ui.empty)+'</p>';return;}
  $('#list').innerHTML=rows.map((t,i)=>
    '<article class="card">'+
      '<div class="c-top">'+
        '<span class="c-av" aria-hidden="true">'+T.esc(T.initial(t.name))+'</span>'+
        '<div class="c-who">'+
          '<div class="c-name">'+T.esc(t.name)+'</div>'+
          '<div class="c-handle">@'+T.esc(t.handle)+'</div>'+
        '</div>'+
        (sort==='heat'?'<span class="c-rank">'+T.esc(ui.rank(i+1))+'</span>':'')+
      '</div>'+
      '<p class="c-text">'+T.rich(t.text)+'</p>'+
      '<div class="c-meta">'+
        '<span>'+T.esc(T.fmtDate(t.date,lang))+'</span>'+
        '<span>♥ '+T.esc(T.fmtNum(t.likes))+'</span>'+
        '<span>🔁 '+T.esc(T.fmtNum(t.retweets))+'</span>'+
        '<span>💬 '+T.esc(T.fmtNum(t.replies))+'</span>'+
        '<span class="hot">🔥 '+T.esc(T.fmtNum(T.heat(t)))+'</span>'+
        '<a class="c-open" href="'+T.esc(t.url)+'" target="_blank" rel="noopener">'+T.esc(ui.open)+'</a>'+
      '</div>'+
    '</article>').join('');
}

$('#sHeat').addEventListener('click',()=>{sort='heat';render();});
$('#sTime').addEventListener('click',()=>{sort='time';render();});
$('#langBtn').addEventListener('click',()=>{
  lang=lang==='en'?'zh':'en';
  try{localStorage.setItem('noodl_lang',lang);}catch(e){}
  render();
});
render();
</script>
</body>
</html>
